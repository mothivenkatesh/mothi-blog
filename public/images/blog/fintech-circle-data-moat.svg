<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 620" width="1000" height="620" style="background: #fff">
  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    .title { font-size: 24px; font-weight: bold; fill: #1e1e1e; }
    .subtitle { font-size: 14px; fill: #868e96; }
    .layer-label { font-size: 16px; font-weight: bold; fill: #1e1e1e; }
    .layer-desc { font-size: 12px; fill: #495057; }
    .layer-note { font-size: 11px; fill: #868e96; font-style: italic; }
    .side-text { font-size: 13px; font-weight: bold; fill: #1e1e1e; }
    .llm-label { font-size: 13px; fill: #e03131; font-weight: bold; }
    .llm-desc { font-size: 11px; fill: #495057; }
  </style>

  <!-- Title -->
  <text x="500" y="30" text-anchor="middle" class="title">The 4-Layer Data Moat</text>
  <text x="500" y="50" text-anchor="middle" class="subtitle">What LLMs Cannot Replicate</text>

  <!-- Layer 1: Verified Identity Graph (outermost) -->
  <rect x="150" y="70" width="700" height="480" rx="16" fill="#a5d8ff" fill-opacity="0.3" stroke="#4a9eed" stroke-width="2"/>
  <text x="500" y="95" text-anchor="middle" class="layer-label">Layer 1: Verified Identity Graph</text>
  <text x="500" y="115" text-anchor="middle" class="layer-desc">Every user = verified role + company + domain</text>
  <text x="500" y="535" text-anchor="middle" class="layer-note">LLMs train on anonymous text. We know WHO said WHAT in WHAT role.</text>

  <!-- Layer 2: Peer Attestation Graph -->
  <rect x="230" y="135" width="540" height="360" rx="14" fill="#b2f2bb" fill-opacity="0.3" stroke="#22c55e" stroke-width="2"/>
  <text x="500" y="160" text-anchor="middle" class="layer-label">Layer 2: Peer Attestation Graph</text>
  <text x="500" y="180" text-anchor="middle" class="layer-desc">Upvotes + Helpful marks = directed reputation edges</text>
  <text x="500" y="480" text-anchor="middle" class="layer-note">Month 12: 80,000+ attestation edges</text>

  <!-- Layer 3: Closed-Loop Transactions -->
  <rect x="310" y="200" width="380" height="250" rx="12" fill="#d0bfff" fill-opacity="0.3" stroke="#8b5cf6" stroke-width="2"/>
  <text x="500" y="225" text-anchor="middle" class="layer-label">Layer 3: Closed-Loop Transactions</text>
  <text x="500" y="245" text-anchor="middle" class="layer-desc">Both parties confirm: who hired whom, for what, at what outcome</text>
  <text x="500" y="435" text-anchor="middle" class="layer-note">This dataset does not exist publicly</text>

  <!-- Layer 4: Anonymous Benchmarks (innermost) -->
  <rect x="380" y="265" width="240" height="150" rx="10" fill="#ffd8a8" fill-opacity="0.4" stroke="#f59e0b" stroke-width="2"/>
  <text x="500" y="290" text-anchor="middle" class="layer-label" style="font-size:14px">Layer 4: Anonymous Benchmarks</text>
  <text x="500" y="315" text-anchor="middle" class="layer-desc">8 verified lending PMs:</text>
  <text x="500" y="335" text-anchor="middle" class="layer-desc">CKYC mismatch = 22% Vendor A</text>
  <text x="500" y="355" text-anchor="middle" class="layer-desc">11% on Vendor B</text>
  <text x="500" y="395" text-anchor="middle" class="layer-note">No LLM can produce this. No analyst firm has it.</text>

  <!-- Right side: Compounds arrow -->
  <text x="910" y="230" text-anchor="middle" class="side-text">COMPOUNDS</text>
  <text x="910" y="250" text-anchor="middle" class="side-text">WITH EVERY</text>
  <text x="910" y="270" text-anchor="middle" class="side-text">INTERACTION</text>
  <line x1="910" y1="285" x2="910" y2="500" stroke="#1e1e1e" stroke-width="2.5"/>
  <polygon points="900,490 910,510 920,490" fill="#1e1e1e"/>

  <!-- Left side: LLM crossed out -->
  <rect x="10" y="220" width="120" height="140" rx="8" fill="#fff5f5" stroke="#e03131" stroke-width="1.5"/>
  <text x="70" y="245" text-anchor="middle" class="llm-label">ChatGPT</text>
  <text x="70" y="265" text-anchor="middle" class="llm-label">Perplexity</text>
  <text x="70" y="285" text-anchor="middle" class="llm-label">Gemini</text>
  <text x="70" y="315" text-anchor="middle" class="llm-desc">Can answer BFSI</text>
  <text x="70" y="332" text-anchor="middle" class="llm-desc">from training data</text>
  <!-- X mark -->
  <line x1="15" y1="225" x2="125" y2="355" stroke="#e03131" stroke-width="3" opacity="0.6"/>
  <line x1="125" y1="225" x2="15" y2="355" stroke="#e03131" stroke-width="3" opacity="0.6"/>

  <!-- Bottom annotation -->
  <text x="500" y="600" text-anchor="middle" class="layer-note" style="font-size:12px">At Month 24: 4 proprietary data layers, none publicly available, none replicable by LLMs</text>
</svg>
